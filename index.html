<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Quack-Click</title>
</head>
    <body>
        <header>
            <h1>Quack & Click</h1>
        </header>

        <div class="main">
            <div class="cuacks">
                <h2>Clicks:</h2>
                <p id="totalClicks">0000</p>

                <h2>CPS:</h2>
                <p id="cps">0</p>
            </div>

            <div class="duck">
                <button class="clicker" id="duckBtn"></button>
            </div>

            <div class="buff"></div>

            <div class="food"></div>
        </div>

        <script>
            let clicks = 0;
            let clicksThisSecond = 0;

            const duckBtn = document.getElementById('duckBtn');
            const totalClicksEl = document.getElementById('totalClicks');
            const cpsEl = document.getElementById('cps');

            // CLICK
            duckBtn.addEventListener('click', () => {
                clicks++;
                clicksThisSecond++;

                totalClicksEl.textContent = clicks.toString().padStart(4, '0');
            });

            setInterval(() => {
                cpsEl.textContent = clicksThisSecond;
                clicksThisSecond = 0;
            }, 1000);
        </script>
    </body>
</html>
