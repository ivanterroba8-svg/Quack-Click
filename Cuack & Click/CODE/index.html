<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/style.css">
    <title>Quack-Click</title>
</head>
<body>
    <header>
        <h1>Quack &amp; Click</h1>
    </header>

    <!-- LOGROS PANEL -->
    <div class="logros-panel" id="logrosPanel">
        <div class="logros-header">
            <h2>🏆 Logros</h2>
            <button class="logros-close" onclick="toggleLogros()">✕</button>
        </div>
        <div class="logros-lista" id="logrosLista"></div>
    </div>

    <!-- NOTIFICACION LOGRO -->
    <div class="logro-notif" id="logroNotif">
        <span class="logro-notif-icon">🏆</span>
        <div>
            <div class="logro-notif-titulo">¡Logro desbloqueado!</div>
            <div class="logro-notif-nombre" id="logroNotifNombre"></div>
        </div>
    </div>

    <div class="main">
        <!-- STATS -->
        <div class="cuacks">
            <h2>Clicks:</h2>
            <p id="totalClicks">0</p>

            <h2>CPS:</h2>
            <p id="cps">0</p>

            <h2>Por Click:</h2>
            <p id="porClick">1</p>

            <button class="reset-boton" onclick="resetGame()">🔄 Reset</button>
            <button class="logros-boton" onclick="toggleLogros()">🏆 Logros <span id="logrosCount" class="logros-badge">0</span></button>
        </div>

        <!-- PATO -->
        <div class="duck">
            <button class="clicker" id="duckBtn"></button>
        </div>

        <!-- UPGRADES -->
        <div class="buff">
            <h2>Mejoras:</h2>
            <div class="buff-lista" id="buffLista"></div>
        </div>

        <!-- BARRA INFERIOR -->
        <div class="food" id="foodBar">
            <div class="food-stats">
                <span>🦆 Clicks totales históricos: <strong id="clicksHistoricos">0</strong></span>
                <span>⏱ Tiempo jugado: <strong id="tiempoJugado">0s</strong></span>
            </div>
        </div>
    </div>

    <script src="SCRIPT/script.js" defer></script>
</body>
</html>
