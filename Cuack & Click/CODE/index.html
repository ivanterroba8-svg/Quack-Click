<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>Quack-Click</title>
</head>
    <body>
        <header>
            <h1>Quack & Click</h1>
        </header>

        <div class="main">
            <div class="cuacks">
                <h2>Clicks:</h2>
                <p id="totalClicks">0000</p>

                <h2>CPS:</h2>
                <p id="cps">0</p>
            </div>

            <div class="duck">
                <button class="clicker" id="duckBtn"></button>
            </div>

            <div class="buff">
                <h2>Buffs:</h2>
                <button class="buff-boton" onclick="comprarLago()">Comprar Lago (1 click por segundo)</button>
                <button class="buff-boton" onclick="comprarPantano()">Comprar Pantano (5 clicks por segundo)</button>
                <button class="buff-boton" onclick="comprarRios()">Comprar Ríos (10 clicks por segundo)</button>
            </div>

            <div class="food"></div>
        </div>
    </body>
</html>
